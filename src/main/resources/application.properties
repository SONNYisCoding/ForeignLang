spring.application.name=ForeignLang

# Database Configuration (Using Port 5434)
spring.datasource.url=jdbc:postgresql://localhost:5434/foreignlang
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Docker Compose
spring.docker.compose.lifecycle-management=start-only
spring.docker.compose.skip.in-tests=false

# ==========================================
# OAuth2 Configuration - Google Login
# ==========================================
# IMPORTANT: Replace with your real credentials from Google Cloud Console
spring.security.oauth2.client.registration.google.client-id=***REMOVED***
spring.security.oauth2.client.registration.google.client-secret=***REMOVED***
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# ==========================================
# Gemini AI Configuration
# ==========================================
# Get your API key from: https://aistudio.google.com/apikey
# gemini.api.key=***REMOVED***
# gemini.api.model=gemini-pro
# gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.mock.enabled=true

# Debugging 500 Error
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true
