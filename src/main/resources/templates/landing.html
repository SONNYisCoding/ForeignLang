<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForeignLang - Master Business English</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-indigo-600">ForeignLang</span>
                </div>
                <div class="flex items-center">
                    <a href="/oauth2/authorization/google" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">Login with Google</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
        <div class="text-center">
            <h1 class="text-4xl tracking-tight font-extrabold text-gray-900 sm:text-5xl md:text-6xl">
                <span class="block">Master Academic English</span>
                <span class="block text-indigo-600">& Workplace Skills</span>
            </h1>
            <p class="mt-3 max-w-md mx-auto text-base text-gray-500 sm:text-lg md:mt-5 md:text-xl md:max-w-3xl">
                Improve your email writing, reports, and presentations with our AI-powered learning platform.
            </p>
            <div class="mt-5 max-w-md mx-auto sm:flex sm:justify-center md:mt-8">
                <div class="rounded-md shadow">
                    <a href="/dashboard" class="w-full flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 md:py-4 md:text-lg md:px-10">
                        Get Started
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Consultant Chatbot Widget -->
    <div id="chatbot" class="fixed bottom-5 right-5 w-80 bg-white shadow-xl rounded-lg overflow-hidden border border-gray-200">
        <div class="bg-indigo-600 p-4 text-white font-bold flex justify-between items-center cursor-pointer" onclick="toggleChat()">
            <span>Consultant Bot</span>
            <span id="toggle-icon">-</span>
        </div>
        <div id="chat-body" class="h-64 p-4 overflow-y-auto bg-gray-50">
            <div class="mb-2">
                <span class="bg-indigo-100 text-indigo-800 px-2 py-1 rounded-lg text-sm">Hello! How can I help you today?</span>
            </div>
        </div>
        <div id="chat-input" class="p-2 border-t border-gray-200 flex">
            <input type="text" id="user-input" class="flex-1 border rounded-l-md p-2 focus:outline-none" placeholder="Ask me anything...">
            <button onclick="sendMessage()" class="bg-indigo-600 text-white px-4 rounded-r-md">Send</button>
        </div>
    </div>

    <script>
        let isOpen = true;
        function toggleChat() {
            const body = document.getElementById('chat-body');
            const input = document.getElementById('chat-input');
            const icon = document.getElementById('toggle-icon');
            if (isOpen) {
                body.style.display = 'none';
                input.style.display = 'none';
                icon.innerText = '+';
            } else {
                body.style.display = 'block';
                input.style.display = 'flex';
                icon.innerText = '-';
            }
            isOpen = !isOpen;
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value;
            if (!text) return;

            const chatBody = document.getElementById('chat-body');

            // User Message
            const userDiv = document.createElement('div');
            userDiv.className = "mb-2 text-right";
            userDiv.innerHTML = `<span class="bg-gray-200 text-gray-800 px-2 py-1 rounded-lg text-sm">${text}</span>`;
            chatBody.appendChild(userDiv);

            inputField.value = '';

            // Call Backend API
            try {
                const response = await fetch('/api/v1/ai/chat?type=CONSULTANT', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: text
                });
                const data = await response.text();

                // Bot Message
                const botDiv = document.createElement('div');
                botDiv.className = "mb-2";
                botDiv.innerHTML = `<span class="bg-indigo-100 text-indigo-800 px-2 py-1 rounded-lg text-sm">${data}</span>`;
                chatBody.appendChild(botDiv);
                chatBody.scrollTop = chatBody.scrollHeight;
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>

</body>
</html>
