version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL=${DB_URL}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USERNAME=${DB_USERNAME}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SEPAY_API_TOKEN=${SEPAY_API_TOKEN}
      - SEPAY_WEBHOOK_TOKEN=${SEPAY_WEBHOOK_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
    # sử dụng -db để chạy docker local
      - db
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      # 1. Lưu trữ dữ liệu bền vững (không mất khi tắt container)
      # - postgres_data:/var/lib/postgresql/data
      # 2. TỰ ĐỘNG CHẠY FILE SQL KHI KHỞI TẠO (Đây là chìa khóa!)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

networks:
  app-network:
    driver: bridge

volumes:
  # sử dụng db-data để chạy local
  db-data:
