<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${topic.title} + ' - Lessons'">Lessons</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/dashboard" class="text-indigo-600 font-bold text-xl">&larr; Back to Dashboard</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto py-10 px-4">
        <div class="mb-8">
            <span class="text-sm font-semibold text-indigo-600 uppercase tracking-wide">Topic</span>
            <h1 class="text-3xl font-bold text-gray-900 mt-1" th:text="${topic.title}">Topic Title</h1>
            <p class="text-gray-600 mt-2" th:text="${topic.description}">Description...</p>
        </div>

        <div class="bg-white shadow overflow-hidden sm:rounded-md">
            <ul class="divide-y divide-gray-200">
                <li th:each="lesson : ${lessons}">
                    <a th:href="@{/lessons/{id}(id=${lesson.id})}" class="block hover:bg-gray-50 transition">
                        <div class="px-4 py-4 sm:px-6 flex items-center justify-between">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold" th:text="${lesson.orderIndex}">
                                    1
                                </div>
                                <div class="ml-4">
                                    <p class="text-lg font-medium text-indigo-600 truncate" th:text="${lesson.title}">Lesson Title</p>
                                    <p class="text-sm text-gray-500">Reading time: 5 mins</p>
                                </div>
                            </div>
                            <div class="ml-2 flex-shrink-0">
                                <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                                </svg>
                            </div>
                        </div>
                    </a>
                </li>
            </ul>
        </div>

        <div th:if="${#lists.isEmpty(lessons)}" class="text-center py-10 text-gray-500">
            No lessons available for this topic yet.
        </div>
    </div>

</body>
</html>
