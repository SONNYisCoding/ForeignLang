spring.application.name=ForeignLang
spring.profiles.active=test
server.port=8080

# Trust Forwarded Headers from Render Load Balancer
server.forward-headers-strategy=framework

# Enable cross-domain Session Cookies between Vercel and Render
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

# ==========================================
# Application URLs
# ==========================================
app.frontend.urls=http://localhost:5173,http://localhost:5174

# Database Configuration (H2 for Tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
spring.docker.compose.skip.in-tests=true

# ==========================================
# OAuth2 Configuration - Google & Facebook
# ==========================================
spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.facebook.client-id=test
spring.security.oauth2.client.registration.facebook.client-secret=test
spring.security.oauth2.client.registration.facebook.scope=email,public_profile

# ==========================================
# Gemini AI Configuration
# ==========================================
gemini.api.key=test_key
gemini.api.model=gemini-1.5-flash
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.mock.enabled=true

# Error Handling (safe defaults for production)
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

spring.devtools.restart.enabled=false

# ==========================================
# SePay Configuration (VietQR)
# ==========================================
sepay.api.token=placeholder
sepay.webhook.token=placeholder
