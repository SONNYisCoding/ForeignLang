spring.application.name=ForeignLang
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${PORT:8080}

# ==========================================
# Application URLs
# ==========================================
app.frontend.urls=${FRONTEND_URL:https://foreignlang.vercel.app},http://localhost:5173,http://localhost:5174

# Database Configuration (Using Port 5434)
# Spring sẽ tìm DB_URL trước (thường dùng ở local/.env)
# Nếu không thấy, nó tìm SPRING_DATASOURCE_URL (thường do Render/Docker cung cấp)
# Nếu không thấy nữa, nó dùng giá trị mặc định ở cuối
spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/foreignlang}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:password}}
spring.datasource.driver-class-name=org.postgresql.Driver
# Cấu hình HikariCP (Database Connection Pool) cho phiên bản Render miễn phí để tránh quá tải database
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
# thêm Dialect của PostgreSQL vào cấu hình để Hibernate sinh mã SQL tối ưu nhất
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Docker Compose
# spring.docker.compose.enabled=true hoặc xóa khi chạy docker-compose
spring.docker.compose.enabled=false
#sử dụng = "start-only" để start-only khi chạy docker
#spring.docker.compose.lifecycle-management=start-only
spring.docker.compose.skip.in-tests=false

# ==========================================
# OAuth2 Configuration - Google & Facebook
# ==========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile

# ==========================================
# Gemini AI Configuration
# ==========================================
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_MODEL:gemini-1.5-flash}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.mock.enabled=${GEMINI_MOCK_ENABLED:true}

# Error Handling (safe defaults for production)
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=${ERROR_STACKTRACE:never}
server.error.include-exception=${ERROR_EXCEPTION:false}

spring.devtools.restart.enabled=false

# ==========================================
# SePay Configuration (VietQR)
# ==========================================
sepay.api.token=${SEPAY_API_TOKEN:placeholder}
sepay.webhook.token=${SEPAY_WEBHOOK_TOKEN:placeholder}
