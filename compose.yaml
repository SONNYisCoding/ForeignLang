services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: foreignlang_db_v4
    environment:
      - 'POSTGRES_DB=foreignlang'
      - 'POSTGRES_PASSWORD=password'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5434:5432'
    volumes:
      - postgres_data_v4:/var/lib/postgresql/data

volumes:
  postgres_data_v4:
