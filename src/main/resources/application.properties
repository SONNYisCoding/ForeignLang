spring.application.name=ForeignLang
server.port=${PORT:8080}

# Database Configuration (Using Port 5434)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/foreignlang}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Docker Compose
spring.docker.compose.lifecycle-management=start-only
spring.docker.compose.skip.in-tests=false

# ==========================================
# OAuth2 Configuration - Google Login
# ==========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ==========================================
# Gemini AI Configuration
# ==========================================
# gemini.api.key=${GEMINI_API_KEY}
# gemini.api.model=gemini-pro
# gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.mock.enabled=true

# Debugging 500 Error
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

spring.devtools.restart.enabled=false

# ==========================================
# SePay Configuration (VietQR)
# ==========================================
sepay.api.token=${SEPAY_API_TOKEN}
sepay.webhook.token=${SEPAY_WEBHOOK_TOKEN}
